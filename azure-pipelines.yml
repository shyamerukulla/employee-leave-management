trigger:
- main

pool:
  name: Default   # your self-hosted agent

variables:
  APP_NAME: employee-leave-management
  APP_VERSION: latest
  DOCKER_USERNAME: shyamerukulla   # 🔴 CHANGE THIS

steps:

# 🔹 Install dependencies
- script: |
    echo "Installing dependencies..."
    npm install
  displayName: Install Dependencies

# 🔹 Run tests
- script: |
    echo "Running tests..."
    npm test
  displayName: Run Tests

# 🔹 Build Docker image
- script: |
    echo "Building Docker image..."
    docker build -t $(APP_NAME):$(APP_VERSION) .
  displayName: Build Docker Image

# 🔹 Tag image for Docker Hub
- script: |
    echo "Tagging Docker image..."
    docker tag $(APP_NAME):$(APP_VERSION) $(DOCKER_USERNAME)/$(APP_NAME):$(APP_VERSION)
  displayName: Tag Image

# 🔹 Push image
- script: |
    echo "Pushing image to Docker Hub..."
    docker push $(DOCKER_USERNAME)/$(APP_NAME):$(APP_VERSION)
  displayName: Push Image

# 🔹 Stop old container (important)
- script: |
    echo "Stopping old container if exists..."
    docker stop $(APP_NAME) || true
    docker rm $(APP_NAME) || true
  displayName: Stop Old Container

# 🔹 Run new container (use different port if needed)
- script: |
    echo "Running new container..."
    docker run -d -p 3001:3000 --name $(APP_NAME) $(APP_NAME):$(APP_VERSION)
  displayName: Run Container

# 🔹 Verify
- script: |
    echo "Verifying container..."
    docker ps | grep $(APP_NAME)
  displayName: Verify Container