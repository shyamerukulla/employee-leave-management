trigger:
  - main

variables:
  dockerHubUsername: 'YOUR_DOCKERHUB_USERNAME'
  imageName: 'employee-leave-app'
  imageTag: '$(Build.BuildId)'

stages:

  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildJob
        displayName: 'Install Test and Build'
        pool:
          name: Default
        steps:

          - script: npm install
            displayName: 'Install dependencies'

          - script: npm test
            displayName: 'Run automated tests'

          - script: |
              docker build -t $(dockerHubUsername)/$(imageName):$(imageTag) .
              docker build -t $(dockerHubUsername)/$(imageName):latest .
            displayName: 'Build Docker image'

  - stage: Push
    displayName: 'Push to Docker Hub'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: PushJob
        displayName: 'Push image to Docker Hub'
        pool:
          name: Default
        steps:

          - task: Docker@2
            displayName: 'Build and push to Docker Hub'
            inputs:
              command: 'buildAndPush'
              repository: '$(dockerHubUsername)/$(imageName)'
              dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              containerRegistry: 'DockerHub-Connection'
              tags: |
                $(imageTag)
                latest
