trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '18.x'
  DOCKER_IMAGE: 'employee-leave-mgmt'

stages:

# ─────────────────────────────────────────
# STAGE 1: Install & Test (Node.js + Jest)
# ─────────────────────────────────────────
- stage: Build_and_Test
  displayName: 'Build & Test'
  jobs:
  - job: NodeBuild
    displayName: 'Install, Lint & Jest Tests'
    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '$(NODE_VERSION)'
      displayName: 'Use Node.js $(NODE_VERSION)'

    - script: npm ci
      displayName: 'Install Dependencies'

    - script: npm test -- --forceExit --ci
      displayName: 'Run Jest Tests'

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/test-results.xml'
      condition: always()

# ─────────────────────────────────────────
# STAGE 2: Docker Build & Push
# ─────────────────────────────────────────
- stage: Docker_Build
  displayName: 'Docker Build & Push'
  dependsOn: Build_and_Test
  jobs:
  - job: DockerJob
    displayName: 'Build & Push Docker Image'
    steps:

    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: build
        dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

    - task: Docker@2
      displayName: 'Push to Docker Hub / ACR'
      inputs:
        command: push
        containerRegistry: 'your-service-connection-name'  # ← change this
        repository: 'your-dockerhub-username/$(DOCKER_IMAGE)'
        tags: |
          $(Build.BuildId)
          latest

# ─────────────────────────────────────────
# STAGE 3: Deploy (optional for now)
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Docker_Build
  condition: succeeded()
  jobs:
  - job: DeployJob
    steps:
    - script: echo "Deploy step - configure Azure Web App or AKS here"
      displayName: 'Placeholder Deploy'
