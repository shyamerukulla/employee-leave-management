trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubUsername: 'shyamsundererukulla21@gmail.com'
  imageName: 'employee-leave-app'
  imageTag: '$(Build.BuildId)'

stages:

  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildJob
        displayName: 'Install Test and Build'
        steps:

          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
            displayName: 'Install Node.js 18'

          - script: |
              echo 'Installing dependencies...'
              npm install
            displayName: 'Install dependencies'

          - script: |
              echo 'Running automated tests...'
              npm test
            displayName: 'Run 13 automated tests'

          - script: |
              echo 'Building Docker image...'
              docker build -t $(dockerHubUsername)/$(imageName):$(imageTag) .
              docker build -t $(dockerHubUsername)/$(imageName):latest .
              echo 'Docker image built successfully!'
            displayName: 'Build Docker image'

  - stage: Push
    displayName: 'Push to Docker Hub'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: PushJob
        displayName: 'Push image to Docker Hub'
        steps:

          - task: Docker@2
            displayName: 'Login and push to Docker Hub'
            inputs:
              command: 'buildAndPush'
              repository: '$(dockerHubUsername)/$(imageName)'
              dockerfile: 'Dockerfile'
              containerRegistry: 'DockerHub-Connection'
              tags: |
                $(imageTag)
                latest
